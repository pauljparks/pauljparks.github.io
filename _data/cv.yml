cv:
  name: Paul J. Parks
  label: Consultant
  location:  Reggio Emilia (Italy)
  image: ""
  summary: Paul was a founder in two startups, one in Norway and the other in Nigeria, that work at the intersection of energy and climate on both policy development and project implementation. On climate, he was involved in some of the first and largest implementation projects under the UN Climate Protocols across Africa, the Middle East, and former Soviet States. In diplomacy he worked on global energy security, the Oslo Peace Accords in Palestine, and post-conflict issues in the Balkans. He worked at the Organization for Economic Cooperation and Development, the US State Department (USAID) and on projects for the United Nations Development Program, the World Bank and the European Bank for Reconstruction and Development as well as major development agencies and private companies.

