    Experience:
      - company: "Carbon-Limits Nigeria"
        position: Managing Director and a Founder
        location: Nigeria
        start_date: 2010
        end_date: 2022
        summary: The startup was established in Lagos in 2010 as a Joint Venture between Carbon Limits (Norway) and Nigerian investors and was the first climate-focused start-up established in Africa. Projects included electricity generation, gas flare reduction, and biofuels that focused on reducing Greenhouse Gas (GHG) emissions and supporting sustainable development. Additionally the company worked with governments and donor agencies on climate policies and their implementation.
        # highlights:
        #  - Relativity
        # - Description 2.
      - company: Carbon Limits
        position: Director and Partner
        location: Oslo, Norway
        start_date: 2004
        end_date: 2022
        summary: "This startup was a spin off from an existing Norwegian consulting firm and focused on developing energy projects covered under the UN Climate Protocols. The company did extensive work in the Russian Federation and former Soviet states as well as in Africa. A multiyear project under a Norwegian initiative assisted the Iranian Ministry of Petroleum on projects to reduce GHG emissions in the upstream sector."
      
      - company: Institute for Sustainable Communities
        position: Country Director
        location: Macedonia # (Formerly Republic of Macedonia)
        start_date: 2002
        end_date: 2004
        summary: "Headed a major American (USAID) initiative on improving social and economic conditions within Macedonia and the Balkans. Activities ranged from local environment improvement, HIV/AIDS treatment and prevention, reducing human trafficking, and poverty alleviation among Roma. Mr. Parks was personally sited by both the US State Department and the Government of Macedonia for “dedication and leadership” in the area of HIV/AIDS."
      - company: Independent Consultant
        position: Independent Consultant
        location: France and Italy
        start_date: 1997
        end_date: 2002
        summary: Extensively involved in a Norwegian initiative that analyzed the economic and social impacts in Palestine’s negotiations under the Oslo Peace Accords. In Kenya, Zimbabwe and Romania worked on energy efficiency policies and project finance. In the Republic of Georgia, directed a UNDP project on reducing transport emissions and development of ambient air policy. In Azerbaijan under the UNDP advised on industrial restructuring as it entered a market economy.
      - company: US Department of State (USAID)
        position: Senior Environmental Investment Advisor
        location: Washington DC
        start_date: 1993
        end_date: 1997
        summary: His primary focus was the implementation of USAID´s program (approximately $6 million annually) to support environmental health investments and related policy development across Central Europe. A major initiative was reducing coal related pollution in Poland, Czech Republic, and Slovakia.

      - company: Organization of Economic Cooperation and Development (International Energy Agency)
        position: Principal Administrator
        location: Paris,France
        start_date: 1986
        end_date: 1989
        summary: Responsible for researching and providing assessments of energy trends and structural changes within the global oil and gas industry for member governments and industry
    Volunteer:
      - company: Major US Energy Firms
        position: Planning and project positions in the US upstream energy
        location: Texas, USA
        start_date: 1975
        end_date: 1979
        summary: During this period, he was Regional Planning and Evaluation Manager for Occidental Petroleum; Corporate Coordinator for Economic Evaluation for El Paso Natural Gas and Senior Project Manager for Union Pacific Corporation energy division.
   
