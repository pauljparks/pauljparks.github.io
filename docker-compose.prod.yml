version: "3.8"

services:
  jekyll:
    image: musawarali/portfolio:latest
    container_name: al-folio-prod
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - JEKYLL_ENV=production
    volumes:
      - ./_site:/srv/jekyll/_site:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - jekyll-network

  # Optional: nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: jekyll-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - jekyll
    networks:
      - jekyll-network

networks:
  jekyll-network:
    driver: bridge
